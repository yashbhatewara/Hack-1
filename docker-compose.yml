services:
  # ============================
  # PostgreSQL 16
  # ============================
  postgres:
    image: postgres:16-alpine
    container_name: emo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eng_memory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eng_memory_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-eng_memory_os}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB:-eng_memory_os} -U ${POSTGRES_USER:-eng_memory}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================
  # Qdrant Vector Database
  # ============================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: emo-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "grep -q '00000000:18BD' /proc/net/tcp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================
  # Backend API (FastAPI)
  # ============================
  backend:
    build:
      context: ./eng-memory-os/backend
      dockerfile: ../deploy/Dockerfile.backend
    container_name: emo-backend
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - ./eng-memory-os/.env
    environment:
      POSTGRES_HOST: postgres
      QDRANT_HOST: qdrant
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./eng-memory-os/backend/src:/app/src
    restart: unless-stopped

  # ============================
  # Background Worker
  # ============================
  worker:
    build:
      context: ./eng-memory-os/backend
      dockerfile: ../deploy/Dockerfile.backend
    container_name: emo-worker
    command: ["python", "-m", "eng_memory_os.cmd.worker"]
    env_file:
      - ./eng-memory-os/.env
    environment:
      POSTGRES_HOST: postgres
      QDRANT_HOST: qdrant
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./eng-memory-os/backend/src:/app/src
    healthcheck:
      disable: true
    restart: unless-stopped

  # ============================
  # Frontend UI (Next.js)
  # ============================
  frontend:
    build:
      context: ./eng-memory-os/frontend
      dockerfile: ../deploy/Dockerfile.frontend
    container_name: emo-frontend
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_WS_URL: ws://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ============================
  # Ollama (Local LLM — Optional)
  # ============================
  ollama:
    image: ollama/ollama:latest
    container_name: emo-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - local-llm
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
