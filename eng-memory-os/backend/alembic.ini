# Alembic configuration for Engineering Memory OS
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = alembic

# Template for revision file names:  <rev_id>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Maximum length for the "slug" in revision filenames
truncate_slug_length = 40

# Set the database URL to a placeholder; the real value is set in env.py
# via application settings to avoid hardcoding credentials.
sqlalchemy.url = driver://user:pass@localhost/dbname

# Output encoding
output_encoding = utf-8


# [post_write_hooks]
# # Automatically run Black + isort after generating migration files
# hooks = black, isort

[post_write_hooks:black]
type = console_scripts
entrypoint = black
options = -l 100

[post_write_hooks:isort]
type = console_scripts
entrypoint = isort
options = --profile black


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
